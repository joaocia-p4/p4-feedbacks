<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema de Feedbacks · Método P4</title>
<link rel="icon" type="image/png" href="assets/p4-mark.png" />
<link rel="apple-touch-icon" href="assets/p4-mark.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --green:#56D54F;
  --green-ink:#2f9a2b;
  --ink:#1C242E;
  --accent:#56D54F;
  --accent-rgb:86,213,79;
  --paper:#FEFEFE;
  --line:#e9ece9;
  --muted:#6b7570;
  --red:#d8423a;
  --amber:#e0922f;
  --panel:#161e26;
  --panel-2:#1f2a33;
  --panel-line:#2c3a45;
  --panel-txt:#e8eef0;
  --panel-mut:#8c9aa3;
  --stage:#eceeec;
  --side-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Sora',system-ui,sans-serif;
  background:var(--stage);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
#root{height:100vh;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* ============================================================= LOGIN */
.login{display:flex;min-height:100vh;background:#0b120f;color:var(--panel-txt)}

/* Painel da marca (esquerda) */
.login-aside{
  flex:0 0 46%;max-width:620px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;padding:52px 56px;
  background:
    radial-gradient(720px 520px at 18% 0%, rgba(var(--accent-rgb),.22), transparent 60%),
    radial-gradient(560px 520px at 120% 115%, rgba(var(--accent-rgb),.12), transparent 55%),
    linear-gradient(160deg,#10201a,#0b120f 72%);
  border-right:1px solid rgba(255,255,255,.06);
}
.login-aside::before{
  content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:44px 44px;mask-image:radial-gradient(700px 520px at 25% 12%,#000,transparent 80%);
}
.la-top{position:relative;display:flex;align-items:center;gap:12px}
.la-top img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(var(--accent-rgb),.45))}
.la-brand{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
.la-mid{position:relative;max-width:440px}
.la-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--panel-mut);margin-bottom:14px}
.la-head{font-size:30px;line-height:1.18;font-weight:800;letter-spacing:-.02em;color:#fff;margin:0 0 28px}
.la-feats{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:14px}
.la-feats li{display:flex;align-items:flex-start;gap:12px;font-size:14px;font-weight:500;color:#cdd8d2}
.la-feats .fi{width:24px;height:24px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;background:rgba(var(--accent-rgb),.16);color:var(--accent);margin-top:1px}
.la-foot{position:relative;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--panel-mut)}

/* Área do formulário (direita) */
.login-main{
  flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px;
  background:radial-gradient(720px 520px at 82% -8%, rgba(var(--accent-rgb),.10), transparent 60%),#11181f;
}
.login-card .login-brand{display:none}

@media (max-width:880px){
  .login-aside{display:none}
  .login-card .login-brand{display:flex}
}
.login-card{
  position:relative;z-index:1;width:100%;max-width:404px;
  background:var(--panel);border:1px solid var(--panel-line);border-radius:18px;
  padding:36px 34px 28px;box-shadow:0 30px 70px -28px rgba(0,0,0,.7);
}
.login-brand{display:flex;align-items:center;gap:13px;margin-bottom:26px}
.login-brand img{width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 0 16px rgba(var(--accent-rgb),.4))}
.login-brand .lb-tag{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.login-brand .lb-name{font-size:17px;font-weight:700;color:var(--panel-txt);letter-spacing:-.01em}
.login h1{font-size:23px;font-weight:700;color:var(--panel-txt);letter-spacing:-.02em;margin-bottom:5px}
.login .sub{font-size:12.5px;color:var(--panel-mut);font-weight:500;margin-bottom:24px}

.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field-label{font-size:11.5px;font-weight:600;color:var(--panel-txt)}
.field-in{display:flex;align-items:center;background:var(--panel-2);border:1px solid var(--panel-line);border-radius:9px;overflow:hidden;transition:.15s}
.field-in:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.14)}
.field-in input{flex:1;background:transparent;border:0;outline:none;color:var(--panel-txt);font-family:'Sora';font-size:13.5px;font-weight:500;padding:11px 13px;width:100%}
.field-in input::placeholder{color:#5d6b74}
.field-in .ic{padding:0 0 0 13px;color:var(--panel-mut);flex:none;display:flex}
.field-in .pw-eye{padding:0 13px;color:var(--panel-mut);background:none;border:0;cursor:pointer;display:flex}
.field-in .pw-eye:hover{color:var(--panel-txt)}

.login-row{display:flex;justify-content:space-between;align-items:center;margin:-2px 0 18px}
.login-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--panel-mut);font-weight:500;user-select:none}
.login-check input{display:none}
.login-check .box{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--panel-line);background:var(--panel-2);display:flex;align-items:center;justify-content:center;transition:.14s}
.login-check input:checked + .box{background:var(--accent);border-color:var(--accent)}
.login-check input:checked + .box::after{content:"";width:5px;height:9px;border:solid #0d1410;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.link{color:var(--accent);font-size:12px;font-weight:600;text-decoration:none;cursor:pointer}
.link:hover{text-decoration:underline}

.btn-primary{
  width:100%;appearance:none;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);color:#0d1410;font-family:'Sora';font-weight:700;font-size:14px;padding:13px;border-radius:9px;transition:.15s;
}
.btn-primary:hover{filter:brightness(1.06)}
.btn-primary:active{transform:translateY(1px)}

.login-div{display:flex;align-items:center;gap:12px;margin:18px 0}
.login-div::before,.login-div::after{content:"";flex:1;height:1px;background:var(--panel-line)}
.login-div span{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--panel-mut)}

.btn-google{
  width:100%;appearance:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:11px;
  background:#fff;color:#1f2a33;border:1px solid #d4d9dd;font-family:'Sora';font-weight:600;font-size:13.5px;padding:11px;border-radius:9px;transition:.15s;
}
.btn-google:hover{background:#f3f5f7}
.btn-google svg{width:18px;height:18px;flex:none}

.login-foot{margin-top:22px;text-align:center;font-size:11px;color:var(--panel-mut);font-weight:500;line-height:1.6}
.login-foot .mono{font-size:10px;letter-spacing:.04em}
.login-err{background:rgba(216,66,58,.14);border:1px solid rgba(216,66,58,.4);color:#ff8b83;font-size:11.5px;font-weight:500;padding:9px 12px;border-radius:8px;margin-bottom:14px;display:flex;gap:8px;align-items:center;animation:laUp .3s ease both}

/* animações da tela de login (entrada em cascata + brilho que respira) */
@keyframes laUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes laGlow{0%,100%{transform:translate(0,0) scale(1);opacity:.6}50%{transform:translate(46px,-28px) scale(1.18);opacity:1}}
@keyframes laLogo{0%,100%{filter:drop-shadow(0 0 14px rgba(var(--accent-rgb),.35))}50%{filter:drop-shadow(0 0 22px rgba(var(--accent-rgb),.6))}}
.login-aside > *{position:relative;z-index:1}
.login-aside::after{
  content:"";position:absolute;left:-140px;top:34%;width:520px;height:520px;border-radius:50%;
  pointer-events:none;z-index:0;filter:blur(26px);
  background:radial-gradient(circle, rgba(var(--accent-rgb),.20), transparent 65%);
  animation:laGlow 9s ease-in-out infinite;
}
.la-top{animation:laUp .55s .05s ease both}
.la-top img{animation:laLogo 5s ease-in-out infinite}
.la-tag{animation:laUp .55s .16s ease both}
.la-head{animation:laUp .6s .24s ease both}
.la-feats li{animation:laUp .5s ease both}
.la-feats li:nth-child(1){animation-delay:.42s}
.la-feats li:nth-child(2){animation-delay:.52s}
.la-feats li:nth-child(3){animation-delay:.62s}
.la-foot{animation:laUp .55s .72s ease both}
.login-card{animation:laUp .6s .12s ease both}
@media (prefers-reduced-motion: reduce){
  .login-aside::after,.la-top img{animation:none}
  .la-top,.la-tag,.la-head,.la-feats li,.la-foot,.login-card,.login-err{animation:none}
}

/* ============================================================= APP SHELL (clients / history) */
.shell{height:100vh;display:flex;flex-direction:column;background:var(--stage);padding-left:var(--side-w)}

/* ---- menu lateral (sidebar) ---- */
.app-side{position:fixed;left:0;top:0;bottom:0;width:var(--side-w);background:var(--panel);border-right:1px solid var(--panel-line);display:flex;flex-direction:column;z-index:40}
.as-brand{display:flex;align-items:center;gap:11px;height:64px;padding:0 18px;border-bottom:1px solid var(--panel-line);flex:none}
.as-brand img{width:30px;height:30px;object-fit:contain;flex:none}
.as-brand b{font-size:14px;font-weight:700;color:var(--panel-txt);letter-spacing:-.01em;display:block;line-height:1.1}
.as-brand .mono{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);display:block;margin-top:2px}
.as-nav{flex:1;overflow-y:auto;padding:12px 12px 18px;display:flex;flex-direction:column;gap:3px}
.as-sec{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--panel-mut);font-weight:600;padding:16px 12px 7px}
.as-sec:first-child{padding-top:6px}
.as-item{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:0;background:none;cursor:pointer;color:var(--panel-mut);font-family:'Sora';font-weight:600;font-size:13.5px;padding:10px 12px;border-radius:10px;transition:.14s;text-decoration:none}
.as-item svg{flex:none}
.as-item span{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.as-item .ext{flex:none;opacity:.45}
.as-item:hover{background:var(--panel-2);color:var(--panel-txt)}
.as-item.on{background:rgba(var(--accent-rgb),.15);color:var(--accent)}
.as-foot{flex:none;border-top:1px solid var(--panel-line);padding:13px 18px;display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;color:var(--panel-mut)}
.as-dot{width:8px;height:8px;border-radius:50%;flex:none}

/* título da página no topbar */
.tb-title{font-size:15px;font-weight:700;color:var(--panel-txt);letter-spacing:-.01em}

/* responsivo: o menu vira um trilho de ícones */
@media (max-width:1000px){
  :root{--side-w:66px}
  .as-brand{justify-content:center;padding:0;gap:0}
  .as-brand div{display:none}
  .as-sec{text-align:center;padding:14px 0 6px;font-size:0;letter-spacing:0}
  .as-item{justify-content:center;padding:11px 0;gap:0}
  .as-item span,.as-item .ext{display:none}
  .as-foot{justify-content:center;padding:13px 0;font-size:0;gap:0}
}

/* ---- página de configurações ---- */
.set-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:16px;align-items:start}
.set-card{background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:20px}
.set-h{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.set-h b{font-size:14.5px;font-weight:700}
.set-ic{width:30px;height:30px;border-radius:9px;background:rgba(var(--accent-rgb),.14);color:var(--accent);display:flex;align-items:center;justify-content:center;flex:none}
.set-acct{display:flex;align-items:center;gap:12px}
.set-av{width:42px;height:42px;border-radius:11px;background:linear-gradient(140deg,var(--accent),oklch(0.6 0.15 165));color:#0d1410;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:none;font-family:'JetBrains Mono',monospace}
.set-acct-nm{font-size:14px;font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-acct-em{font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0;border-top:1px solid var(--line)}
.set-row:first-of-type{border-top:0;padding-top:4px}
.set-row-t{font-size:13px;font-weight:600}
.set-row-s{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:3px;max-width:280px;line-height:1.45}
.set-accs{display:flex;gap:9px;flex:none}
.set-acc{width:28px;height:28px;border-radius:8px;border:0;cursor:pointer;transition:.13s;padding:0}
.set-acc:hover{transform:scale(1.08)}
.set-acc.on{box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--ink)}
.set-tag{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.02em;text-transform:lowercase;color:var(--muted);background:#eef1ee;padding:5px 10px;border-radius:7px;flex:none}
.set-about{display:flex;flex-direction:column}
.set-kv{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--line);font-size:13px}
.set-kv:first-child{border-top:0}
.set-kv span{color:var(--muted);font-weight:500}
.set-kv b{font-weight:600}
.set-card .link{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none}
.set-card .link:hover{text-decoration:underline}
.topbar{
  flex:none;display:flex;align-items:center;gap:18px;height:64px;padding:0 26px;
  background:var(--panel);border-bottom:1px solid var(--panel-line);
}
.tb-brand{display:flex;align-items:center;gap:11px;flex:none}
.tb-brand img{width:30px;height:30px;object-fit:contain}
.tb-brand b{font-size:14.5px;font-weight:700;color:var(--panel-txt);letter-spacing:-.01em}
.tb-brand .mono{font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);display:block;margin-top:1px}
.tb-spacer{flex:1}
.tb-back{display:flex;align-items:center;gap:8px;background:none;border:0;cursor:pointer;color:var(--panel-mut);font-family:'Sora';font-weight:600;font-size:13px;padding:8px 10px;border-radius:8px;transition:.14s}
.tb-back:hover{color:var(--panel-txt);background:var(--panel-2)}

.tb-user{display:flex;align-items:center;gap:11px;flex:none;cursor:pointer;padding:6px 8px 6px 6px;border-radius:10px;transition:.14s;position:relative}
.tb-user:hover{background:var(--panel-2)}
.avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(140deg,var(--accent),oklch(0.6 0.15 165));color:#0d1410;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12.5px;flex:none;font-family:'JetBrains Mono',monospace}
.tb-user .nm{font-size:12.5px;font-weight:600;color:var(--panel-txt);line-height:1.25}
.tb-user .rl{font-size:10px;color:var(--panel-mut);font-weight:500;text-transform:capitalize}
.tb-menu{position:absolute;top:56px;right:0;background:var(--panel-2);border:1px solid var(--panel-line);border-radius:11px;padding:6px;min-width:180px;box-shadow:0 20px 50px -16px rgba(0,0,0,.6);z-index:30}
.tb-menu button{width:100%;display:flex;align-items:center;gap:9px;background:none;border:0;cursor:pointer;color:var(--panel-txt);font-family:'Sora';font-weight:500;font-size:12.5px;padding:9px 10px;border-radius:7px;text-align:left}
.tb-menu button:hover{background:var(--panel)}
.tb-menu button.danger{color:#ff8b83}
.tb-menu .sep{height:1px;background:var(--panel-line);margin:5px 4px}

.role-pill{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;padding:3px 7px;border-radius:6px;background:rgba(var(--accent-rgb),.16);color:var(--accent)}
.role-pill.analista{background:rgba(140,154,163,.18);color:var(--panel-mut)}
.role-pill.cs{background:rgba(42,111,219,.18);color:#5b9bff}
.dash-print-head{display:none}
@media print{
  @page{margin:14mm}
  :root{--side-w:0px}
  html,body{background:#fff !important}
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  .app-side,.topbar,.twk-panel,[data-omelette-chrome],.toast,.no-print,.duebar,.toolbar{display:none !important}
  .page{background:#fff !important;padding:0 !important}
  .page-inner{max-width:none !important;padding:0 !important}
  .dash-print-head{display:flex !important;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #1C242E}
  .dash-print-head img{width:34px}
  .dash-no-break{break-inside:avoid;page-break-inside:avoid}
  h1{font-size:20px}
}

/* page scroller */
.page{flex:1;overflow-y:auto;overflow-x:hidden}
.page-inner{max-width:1280px;margin:0 auto;padding:30px 30px 60px}

/* ---- clients header / toolbar ---- */
.ch-top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.ch-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--green-ink);margin-bottom:8px}
.ch-top h1{font-size:25px;font-weight:700;letter-spacing:-.02em}
.ch-top .ch-sub{font-size:12.5px;color:var(--muted);font-weight:500;margin-top:4px}
.ch-sub b{color:var(--ink);font-weight:700}

.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search{display:flex;align-items:center;gap:9px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:0 13px;flex:1;min-width:230px;max-width:420px;transition:.15s}
.search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12)}
.search svg{color:var(--muted);flex:none}
.search input{flex:1;border:0;outline:none;background:transparent;font-family:'Sora';font-size:13.5px;font-weight:500;color:var(--ink);padding:11px 0}
.search input::placeholder{color:#9aa39d}

.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{appearance:none;cursor:pointer;border:1px solid var(--line);background:var(--paper);color:var(--muted);font-family:'Sora';font-size:12px;font-weight:600;padding:8px 13px;border-radius:999px;transition:.14s;display:flex;align-items:center;gap:7px}
.chip:hover{border-color:#c9cfca;color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chip .dot{width:7px;height:7px;border-radius:50%}

/* ---- due / send-date filter ---- */
.duebar{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin:-6px 0 20px}
.due-toggle{appearance:none;cursor:pointer;display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);font-family:'Sora';font-weight:600;font-size:13px;padding:9px 15px;border-radius:10px;transition:.14s}
.due-toggle svg{color:var(--green-ink)}
.due-toggle:hover{border-color:#c9cfca}
.due-toggle.on{background:var(--ink);border-color:var(--ink);color:#fff}
.due-toggle.on svg{color:var(--accent)}
.due-date{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:0 12px;color:var(--muted);transition:.14s}
.due-date:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12)}
.due-date input{border:0;outline:none;background:transparent;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:500;color:var(--ink);padding:10px 0}
.due-date input::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.55}
.due-info{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--green-ink);background:rgba(var(--accent-rgb),.12);padding:6px 11px;border-radius:8px;font-weight:600}
.due-hint{font-size:12px;color:var(--muted);font-weight:500}
.due-late{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--red);background:rgba(216,66,58,.12);padding:6px 11px;border-radius:8px;font-weight:600}

.btn-dark{appearance:none;cursor:pointer;border:0;background:var(--ink);color:#fff;font-family:'Sora';font-weight:600;font-size:13px;padding:11px 16px;border-radius:10px;display:flex;align-items:center;gap:8px;transition:.15s;text-decoration:none}
.btn-dark:hover{background:#28323d}
.btn-accent{appearance:none;cursor:pointer;border:0;background:var(--accent);color:#0d1410;font-family:'Sora';font-weight:700;font-size:13px;padding:11px 16px;border-radius:10px;display:flex;align-items:center;gap:8px;transition:.15s;text-decoration:none}
.btn-accent:hover{filter:brightness(1.06)}
.btn-line{appearance:none;cursor:pointer;border:1px solid var(--line);background:var(--paper);color:var(--ink);font-family:'Sora';font-weight:600;font-size:13px;padding:10px 15px;border-radius:10px;display:flex;align-items:center;gap:8px;transition:.15s;text-decoration:none}
.btn-line:hover{border-color:#c9cfca;background:#f6f8f6}
.btn-line.danger-line{color:var(--red)}
.btn-line.danger-line:hover{border-color:var(--red);background:rgba(216,66,58,.06)}

/* ---- client cards grid ---- */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(296px,1fr));gap:16px}
.ccard{
  background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:18px;cursor:pointer;
  transition:.16s;display:flex;flex-direction:column;gap:14px;position:relative;
}
.ccard:hover{border-color:rgba(var(--accent-rgb),.6);box-shadow:0 16px 36px -22px rgba(28,36,46,.4);transform:translateY(-2px)}
.cc-head{display:flex;align-items:flex-start;gap:11px}
.cc-head .nm{flex:1;min-width:0}
.cc-head .loja{font-size:15.5px;font-weight:700;letter-spacing:-.01em;line-height:1.25;text-wrap:balance}
.cc-head .an{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:3px;display:flex;align-items:center;gap:6px}
.mk-badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.04em;padding:4px 8px;border-radius:7px;flex:none}
.status-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 9px 4px 7px;border-radius:999px}
.status-tag .d{width:7px;height:7px;border-radius:50%}
.status-tag.ok{background:rgba(86,213,79,.14);color:var(--green-ink)}
.status-tag.ok .d{background:var(--green)}
.status-tag.late{background:rgba(216,66,58,.12);color:var(--red)}
.status-tag.late .d{background:var(--red)}

.cc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:13px;background:#f6f8f6;border-radius:11px}
.cc-met .k{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cc-met .v{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.01em}
.cc-met .v small{font-size:11px;font-weight:600;color:var(--muted);margin-left:1px}
.cc-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:2px}
.cc-foot .lr{font-size:11px;color:var(--muted);font-weight:500}
.cc-foot .lr b{color:var(--ink);font-weight:600}
.cc-foot-r{display:flex;align-items:center;gap:8px}
.cc-edit{appearance:none;cursor:pointer;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.13s;opacity:0}
.ccard:hover .cc-edit{opacity:1}
.cc-edit:hover{border-color:var(--accent);color:var(--green-ink);background:rgba(var(--accent-rgb),.07)}
.cc-count{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;color:var(--muted);background:#eef1ee;padding:4px 9px;border-radius:7px}

.add-card{
  border:1.5px dashed #c4cbc4;background:transparent;border-radius:15px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:200px;
  color:var(--muted);font-family:'Sora';font-weight:600;font-size:13.5px;transition:.16s;
}
.add-card:hover{border-color:var(--accent);color:var(--green-ink);background:rgba(var(--accent-rgb),.05)}
.add-card .plus{width:42px;height:42px;border-radius:12px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center}
.add-card:hover .plus{background:var(--accent);color:#0d1410}

.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.empty b{display:block;color:var(--ink);font-size:15px;font-weight:700;margin-bottom:6px}

/* ---- clients as list (tweak) ---- */
.clist{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.clist-row{display:grid;grid-template-columns:2fr 1fr 1.1fr 1fr 1.1fr auto;gap:16px;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:.13s}
.clist-row:last-child{border-bottom:0}
.clist-row:hover{background:#f6f8f6}
.clist-row.head{background:#f6f8f6;cursor:default;padding:11px 18px}
.clist-row.head span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500}
.clist .loja{font-size:14px;font-weight:700}
.clist .an{font-size:11px;color:var(--muted);margin-top:2px}
.clist .num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13.5px}

/* ============================================================= HISTORY */
.hh{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:24px}
.hh-id .crumb{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.hh-id h1{font-size:28px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:13px;flex-wrap:wrap}
.hh-id .meta{display:flex;align-items:center;gap:16px;margin-top:11px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);font-weight:500}
.hh-id .meta b{color:var(--ink);font-weight:600}
.hh-actions{display:flex;gap:10px;flex-wrap:wrap}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:16px 17px}
.kpi .k{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.kpi .v{font-size:25px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em;line-height:1}
.kpi .v small{font-size:13px;color:var(--muted);font-weight:600}
.kpi .trend{font-size:11px;font-weight:600;margin-top:7px;display:flex;align-items:center;gap:5px}
.kpi .trend.up{color:var(--green-ink)}
.kpi .trend.down{color:var(--red)}

.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-head h2{font-size:15px;font-weight:700}
.sec-head .mono{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.sec-head::after{content:"";flex:1;height:1px;background:var(--line)}

.rtable{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.rrow{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(0,1.1fr) minmax(0,.85fr) minmax(0,.85fr) minmax(0,.85fr) minmax(0,1fr) minmax(0,1.05fr) 150px;gap:14px;align-items:center;padding:15px 20px;border-bottom:1px solid var(--line);transition:.13s}
.rrow:last-child{border-bottom:0}
.rrow:hover{background:#f9faf9}
.rrow.head{background:#f6f8f6;padding:11px 20px}
.rrow.head span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500}
.rrow .per{font-weight:600;font-size:13px}
.rrow .per .mono{font-size:10px;color:var(--muted);font-weight:500;display:block;margin-top:2px}
.rrow .num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13.5px;text-align:right;font-variant-numeric:tabular-nums}
.rrow .num small{font-size:10px;color:var(--muted);font-weight:500}
.r-actions{display:flex;gap:6px;justify-content:flex-end}
.iconbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.13s}
.iconbtn:hover{border-color:var(--accent);color:var(--green-ink);background:rgba(var(--accent-rgb),.07)}
.iconbtn.danger:hover{border-color:var(--red);color:var(--red);background:rgba(216,66,58,.07)}

.mini-chart{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:26px}
.mini-chart .mc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.mini-chart .mc-head b{font-size:13.5px;font-weight:700}
.mini-chart .mc-head span{font-size:11px;color:var(--muted);font-weight:500}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:12px 18px;border-radius:10px;box-shadow:0 18px 44px -16px rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;gap:10px;animation:tin .2s ease}
.toast .d{width:8px;height:8px;border-radius:50%;background:var(--green)}
@keyframes tin{from{opacity:0;transform:transl(-50%,8px)}}

/* ---- marketplace chips (client cards / rows) ---- */
.mk-row{display:flex;flex-wrap:wrap;gap:6px}
.mk-chip{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.02em;padding:4px 9px 4px 8px;border-radius:7px}
.mk-chip .d{width:6px;height:6px;border-radius:50%;flex:none}

/* ---- marketplace tabs (history) ---- */
.mk-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.mk-tab{appearance:none;cursor:pointer;display:flex;align-items:center;gap:8px;background:var(--paper);border:1.5px solid var(--line);color:var(--muted);font-family:'Sora';font-weight:600;font-size:13px;padding:9px 14px;border-radius:10px;transition:.14s}
.mk-tab:hover{border-color:#c9cfca}
.mk-tab .d{width:8px;height:8px;border-radius:50%}
.mk-tab.on{background:#fff;font-weight:700}
.mk-tab-n{font-family:'JetBrains Mono',monospace;font-size:10px;background:#eef1ee;color:var(--muted);padding:2px 6px;border-radius:6px;font-weight:600}

/* ---- new-client form ---- */
.form-card{background:var(--paper);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.form-sec{padding:22px 24px}
.form-sec + .form-sec{border-top:1px solid var(--line)}
.form-sec-head{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;margin-bottom:16px}
.form-sec-head .mono{font-size:10px;letter-spacing:.06em;color:var(--accent);background:rgba(var(--accent-rgb),.14);padding:3px 7px;border-radius:6px;font-weight:700}
.form-sec-note{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.02em;text-transform:lowercase;color:var(--muted);font-weight:500}
.form-grid{display:grid;grid-template-columns:1.4fr 1fr 1.4fr;gap:14px;align-items:end}
.lfield{display:flex;flex-direction:column;gap:7px;min-width:0}
.lf-label{font-size:12px;font-weight:600;color:var(--ink)}
.lf-label i{font-style:normal;color:var(--muted);font-weight:500;font-size:11px}
.lf-in{display:flex;align-items:center;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:.15s}
.lf-in:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12)}
.lf-in.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(216,66,58,.1)}
.lf-in input{flex:1;min-width:0;border:0;outline:none;background:transparent;font-family:'Sora';font-size:13.5px;font-weight:500;color:var(--ink);padding:11px 13px}
.lf-in input.mono{font-family:'JetBrains Mono',monospace;font-size:12.5px}
.lf-in input::placeholder{color:#9aa39d}
.lf-in .affix-r{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);padding:0 12px 0 0}
.lf-in .affix-l{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);padding:0 0 0 12px}
.lf-in.is-select{position:relative}
.lf-in.is-select select{flex:1;min-width:0;appearance:none;border:0;outline:none;background:transparent;font-family:'Sora';font-size:13.5px;font-weight:500;color:var(--ink);padding:11px 13px;cursor:pointer}
.lf-in.is-select select:disabled{color:var(--muted);cursor:not-allowed}
.lf-in .sel-caret{position:absolute;right:12px;pointer-events:none;color:var(--muted);font-size:11px}
.seg{display:flex;background:#f1f3f1;border-radius:10px;padding:3px;gap:3px}
.seg button{flex:1;appearance:none;border:0;cursor:pointer;background:none;padding:8px 6px;border-radius:8px;font-family:'Sora';font-weight:600;font-size:12.5px;color:var(--muted);transition:.13s}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.09)}
.mk-card{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:#fcfdfc}
.mk-card-top{display:flex;gap:10px;align-items:center;margin-bottom:13px}
.mk-pick{flex:1 1 220px;min-width:0}
.mk-acct-id{flex:1 1 200px;min-width:0}
.mk-metas{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.meta-field{display:flex;flex-direction:column;gap:6px;min-width:0}
.mf-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:500}
.meta-field .lf-in input{padding:9px 10px;text-align:right}
.add-mk{appearance:none;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border:1px dashed #c4cbc4;background:transparent;color:var(--green-ink);font-family:'Sora';font-weight:600;font-size:13px;padding:11px;border-radius:10px;margin-top:4px;transition:.14s}
.add-mk:hover{border-color:var(--accent);background:rgba(var(--accent-rgb),.05)}
.add-mk:disabled{opacity:.4;cursor:not-allowed}
.form-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.sched-grid{display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start}
.wd-row{display:flex;gap:6px;flex-wrap:wrap}
.wd-chip{appearance:none;cursor:pointer;min-width:46px;border:1px solid var(--line);background:#fff;color:var(--muted);font-family:'Sora';font-weight:600;font-size:12px;padding:9px 8px;border-radius:9px;transition:.13s}
.wd-chip:hover{border-color:#c9cfca;color:var(--ink)}
.wd-chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.sched-preview{display:inline-flex;align-items:center;gap:9px;margin-top:16px;background:rgba(var(--accent-rgb),.1);color:var(--green-ink);border:1px solid rgba(var(--accent-rgb),.3);padding:9px 14px;border-radius:9px;font-size:13px;font-weight:600}
.cc-sched{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:11px;font-weight:600;color:var(--muted);background:#f1f3f1;padding:4px 9px 4px 8px;border-radius:7px}
.cc-sched svg{flex:none;color:var(--green-ink)}

@media (max-width:720px){
  .form-grid{grid-template-columns:1fr}
  .mk-metas{grid-template-columns:1fr 1fr}
  .mk-card-top{flex-wrap:wrap}
  .kpis{grid-template-columns:1fr 1fr}
  .rrow,.rrow.head{grid-template-columns:minmax(0,1.5fr) minmax(0,1fr) minmax(0,.8fr) 150px}
  .rrow .col-hide{display:none}
  .tb-user .who{display:none}
}
</style>
</head>
